{% extends 'base.html' %}
{% block container %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        
        <h2 class="mb-1">Edit Result</h2>
        <h4 class="text-muted mb-4">{{ ladder }}</h4>

        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <form id="edit_result_form" method="post">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-bold" for="winner_id">Winner:</label>
                        <select name="winner_id" id="winner_id" class="form-select">
                            <option value="{{ winner.id }}">{{ winner.first_name }} {{ winner.last_name }}</option>
                            <option value="{{ loser.id }}">{{ loser.first_name }} {{ loser.last_name }}</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold" for="losing_score">Losing Result:</label>
                        <input type="number" name="losing_score" id="losing_score" min="0" max="8"
                               value="{{ losing_score }}" class="form-control" style="max-width: 100px;">
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="confirmBox" name="confirm" required aria-required="true" title="Please tick to confirm the update.">
                        <label class="form-check-label ms-2" for="confirmBox">
                            I confirm I want to update this result
                        </label>
                        <div id="confirmHelp" class="text-danger small mt-1" style="display:none;">
                            Please tick to confirm the update.
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-5">
                        <button id="saveBtn" class="btn btn-primary px-4" type="submit">Save</button>
                        <a class="btn btn-outline-danger" href="{% url 'result_entry_delete' pair_key %}">Delete</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var form  = document.getElementById('edit_result_form');
  var box   = document.getElementById('confirmBox');
  var help  = document.getElementById('confirmHelp');
  if (!form || !box) return;

  // Show/hide helper when user toggles the checkbox
  box.addEventListener('change', function () {
    if (help) help.style.display = box.checked ? 'none' : '';
  });

  // If user tries to submit without ticking, native required will block.
  // We also reveal our helper for clarity.
  form.addEventListener('submit', function (e) {
    if (!box.checked) {
      if (help) help.style.display = '';
      box.focus();
    }
  });
});
</script>
{% endblock %}
