{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block container %}
<div class="row mt-5">
    <div class="col-md-8 col-lg-6">
        <h2 class="mb-4 text-success">Password Reset Complete</h2>
        
        <div class="card shadow-sm border-success border-opacity-25">
            <div class="card-body p-4 p-md-5">
                <p class="lead">Your new password has been set successfully!</p>
                <p>You can now log in to enter your results.</p>
                
                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
